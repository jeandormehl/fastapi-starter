name: "fastapi-starter-otel"

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./conf/otel/otel-collector-config.yml:/etc/otel-collector-config.yml
    depends_on:
      prometheus:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - otel-tier
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:13133/"]
      interval: "30s"
      timeout: "10s"
      retries: "3"
      start_period: "30s"

  jaeger:
    image: jaegertracing/jaeger:latest
    environment:
      - METRICS_STORAGE_TYPE=prometheus
      - PROMETHEUS_SERVER_URL=http://prometheus:9090
    command:
      - "--config=/etc/jaeger/config.yaml"
    volumes:
      - ./conf/otel/jaeger-config.yaml:/etc/jaeger/config.yaml
    networks:
      - otel-tier
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:16686/"]
      interval: "30s"
      timeout: "10s"
      retries: "3"
      start_period: "30s"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./conf/otel/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - otel-tier
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: "30s"
      timeout: "10s"
      retries: "3"
      start_period: "30s"

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./conf/otel/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./conf/otel/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - otel-tier
    depends_on:
      prometheus:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: "30s"
      timeout: "10s"
      retries: "3"
      start_period: "30s"

volumes:
  grafana-storage:
  prometheus-data:

networks:
  otel-tier:
    name: "otel-tier"
    driver: bridge
