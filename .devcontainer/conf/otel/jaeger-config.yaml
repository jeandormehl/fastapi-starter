service:
  extensions: [jaeger_storage, jaeger_query, health_check]
  pipelines:
    traces:
      receivers: [otlp, jaeger]
      processors: [batch, memory_limiter]
      exporters: [jaeger_storage_exporter]
    metrics:
      receivers: [otlp]
      processors: [batch, memory_limiter]
      exporters: [prometheus]

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

  jaeger_query:
    storage:
      traces: memory
    ui:
      config_file: /etc/jaeger/ui-config.json

  jaeger_storage:
    backends:
      memory:
        memory:
          max_traces: 100000

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Legacy Jaeger receivers for backward compatibility
  jaeger:
    protocols:
      grpc:
        endpoint: 0.0.0.0:14250
      thrift_http:
        endpoint: 0.0.0.0:14268
      thrift_compact:
        endpoint: 0.0.0.0:6831
      thrift_binary:
        endpoint: 0.0.0.0:6832

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048

  memory_limiter:
    limit_mib: 512

exporters:
  jaeger_storage_exporter:
    trace_storage: memory

  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "jaeger"
    const_labels:
      environment: "${env:ENVIRONMENT}"
