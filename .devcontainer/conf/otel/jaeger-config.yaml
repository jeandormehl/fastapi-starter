receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:4317"
      http:
        endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:4318"

  jaeger:
    protocols:
      grpc:
        endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:14250"
      thrift_http:
        endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:14268"
      thrift_compact:
        endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:6831"
      thrift_binary:
        endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:6832"

  zipkin:
    endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:9411"

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048

exporters:
  jaeger_storage_exporter:
    trace_storage: memory_storage

  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  jaeger_storage:
    backends:
      memory_storage:
        memory:
          max_traces: 100000

  healthcheckv2:
    endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:13133"

  pprof:
    endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:1888"

  zpages:
    endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:55679"

  jaeger_query:
    storage:
      traces: memory_storage
    ui:
      config_file: ""
    base_path: "/"
    grpc:
      endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:16685"
    http:
      endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:16686"

service:
  extensions: [jaeger_storage, healthcheckv2, pprof, zpages, jaeger_query]

  pipelines:
    traces:
      receivers: [otlp, jaeger, zipkin]
      processors: [batch]
      exporters: [jaeger_storage_exporter, debug]

  telemetry:
    logs:
      level: "info"
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}"
                port: 8888
