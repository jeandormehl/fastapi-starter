receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:4317"
      http:
        endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:4318"

  # Legacy Jaeger receivers for backward compatibility
  jaeger:
    protocols:
      grpc:
        endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:14250"
      thrift_http:
        endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:14268"
      thrift_compact:
        endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:6831"
      thrift_binary:
        endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:6832"

  # Zipkin receiver for compatibility
  zipkin:
    endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:9411"

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048

exporters:
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  healthcheckv2:
    endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:13133"

  pprof:
    endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:1888"

  zpages:
    endpoint: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}:55679"

  # Jaeger Query extension for UI
  jaeger_query:
    ui:
      config_file: ""
    base_path: "/"

service:
  extensions: [healthcheckv2, pprof, zpages, jaeger_query]

  pipelines:
    traces:
      receivers: [otlp, jaeger, zipkin]
      processors: [batch]
      exporters: [debug]

  telemetry:
    logs:
      level: "info"
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: "${env:JAEGER_LISTEN_HOST:-0.0.0.0}"
                port: 8888
