name: "fastapi-starter"

services:
  app:
    build:
      context: ".."
      dockerfile: ".devcontainer/Dockerfile"
      target: "build-dev"  # TODO: Change to "build" later
    depends_on:
      - "redis"
      - "postgres"
    env_file:
      - ".env"
    networks:
      - "app-tier"
      - "infra-tier"
    restart: "unless-stopped"
    volumes:
      - ".:/app"

networks:
  app-tier:
    name: "app-tier"
    driver: bridge
  infra-tier:
    name: "infra-tier"
    driver: bridge

include:
  - docker-compose.deps.yml
