name: "fastapi-starter"

services:
  app:
    build:
      context: ".."
      dockerfile: ".devcontainer/Dockerfile"
      target: "build-dev"  # TODO: Change to "build" later
    depends_on:
      - "redis"
      - "postgres"
    environment:
      ENVIRONMENT: "${ENVIRONMENT}"
      TZ: "${TZ}"
    networks:
      - "app-tier"
      - "infra-tier"
    restart: "unless-stopped"
    volumes:
      - ".:/app"
    command: "/start.sh app"
